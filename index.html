<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e1e2f;
        }
        
        .calculator {
            background: #2c2c3e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 320px;
        }
        
        #display {
            width: 100%;
            height: 70px;
            border: none;
            outline: none;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 28px;
            text-align: right;
            background: #f4f4f4;
            color: #111;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .operator {
            background: #ff9500;
            color: white;
        }
        
        .equal {
            background: #34c759;
            color: white;
            grid-column: span 2;
        }
        
        .clear {
            background: #ff3b30;
            color: white;
        }
        
        .number,
        .dot {
            background: #3a3a4f;
            color: white;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" readonly />

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="number" onclick="appendValue('1')">1</button>

            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="number" onclick="appendValue('0')">0</button>
            <button class="dot" onclick="appendValue('.')">.</button>

            <button class="equal" onclick="calculateResult()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function calculateResult() {
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
            }
        }
    </script>

</body>

</html>
